<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Hoor Book Cafe — Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="brand-mark">
        <img src="./images/logo.png" alt="" />
      </div>
      <h1 class="display">کافه کتاب <em>هور</em></h1>
      <p>قهوه، غذا و محیطی دنج برای مطالعه</p>
      <div class="header__meta">
        <span>7:00 a.m – 11:30 p.m</span>
        <span>سرو در محل و بیرون‌بر</span>
      </div>
      <div class="tap-hint">برای افزودن روی آن ضربه بزنید →</div>
    </header>

    <main>
      <section class="menu__section" id="coffee">
        <div class="menu__head">
          <span class="menu__index mono">01</span>
          <h2>قهوه</h2>
        </div>

        <button class="item" data-name="اسپرسو" data-price="220">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/coffee.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">اسپرسو</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">220T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="کاپوچینو" data-price="200">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/capochino.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">کاپوچینو</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">200T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="لاته" data-price="250">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/latte.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">لاته</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">250T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="آیس لاته" data-price="220">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/iceCoffee.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">آیس آمریکانو</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">220T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>
      </section>

      <section class="menu__section" id="pizza">
        <div class="menu__head">
          <span class="menu__index mono">02</span>
          <h2>سیب زمینی</h2>
        </div>

        <button class="item" data-name="سیب زمینی پنیری" data-price="380">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/frise1.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">پنیری</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">380T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="سیب زمینی مخلوط" data-price="380">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/frise2.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">مخلوط</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">380T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="سیب زمینی مخصوص" data-price="400">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/fries3.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">مخصوص</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">400T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>
      </section>

      <section class="menu__section" id="pasta">
        <div class="menu__head">
          <span class="menu__index mono">03</span>
          <h2>پاستا</h2>
        </div>

        <button class="item" data-name="پاستا چیکن آلفردو" data-price="420">
          <span class="item__flash"></span>
          <div class="order-info">
            <div class="order-img">
              <img src="./images/pasta.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">چیکن آلفردو</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">420T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>
      </section>

      <section class="menu__section" id="pastries">
        <div class="menu__head">
          <span class="menu__index mono">04</span>
          <h2>نوشیدنی خنک</h2>
        </div>

        <button class="item" data-name="موهیتو" data-price="200">
          <span class="item__flash"></span>
            <div class="order-info">
            <div class="order-img">
              <img src="./images/mohito.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">موهیتو</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">200T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="لیموناد" data-price="180">
          <span class="item__flash"></span>
           <div class="order-info">
            <div class="order-img">
              <img src="./images/lemonade.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">لیموناد</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">180T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="شیک شکلات" data-price="320">
          <span class="item__flash"></span>
           <div class="order-info">
            <div class="order-img">
              <img src="./images/chocolate-milkshake.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">شیک شکلات</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">320T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>

        <button class="item" data-name="شیک توت فرنگی" data-price="250">
          <span class="item__flash"></span>
            <div class="order-info">
            <div class="order-img">
              <img src="./images/strawberry-milkshak1.png" alt="" />
            </div>
            <div class="about-order">
              <span class="item__info">
                <span class="item__name">شیک توت فرنگی</span>
              </span>

              <span class="item__right">
                <span class="item__price mono">250T</span>
                <span class="item__add">+</span>
              </span>
            </div>
          </div>
        </button>
      </section>
    </main>

    <!-- Floating cart button -->
    <button class="cart-fab" id="cartFab">
      <span class="cart-fab__label"
        ><span class="cart-fab__badge" id="cartCount">0</span>&nbsp;مشاهده
        سفارش</span
      >
      <span class="cart-fab__total mono" id="cartFabTotal">0T</span>
    </button>

    <!-- Order drawer -->
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div
      class="drawer"
      id="drawer"
      role="dialog"
      aria-modal="true"
      aria-label="Your order"
    >
      <div class="drawer__handle"></div>
      <div class="drawer__head">
        <h2>سفارش شما</h2>
        <button class="drawer__close" id="drawerClose" aria-label="Close">
          &times;
        </button>
      </div>
      <div class="drawer__list" id="drawerList">
        <div class="drawer__empty">سفارشی موجود نیست</div>
      </div>
      <div class="drawer__footer">
        <div class="drawer__total">
          <span>کل</span><strong class="mono" id="drawerTotal">$0.00</strong>
        </div>
        <!-- <button class="btn btn--primary" id="placeOrderBtn">Place order</button> -->
        <button class="btn btn--ghost" id="clearOrderBtn">پاکسازی</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./main.js"></script>
  </body>
</html>
